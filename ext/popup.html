<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f9fafb;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #374151;
      font-weight: 600;
    }
    .info {
      background: white;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    .label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .value {
      font-size: 16px;
      font-weight: 600;
      color: #667eea;
    }
    .status {
      font-size: 12px;
      color: #059669;
      padding: 8px;
      background: #ecfdf5;
      border-radius: 4px;
      border-left: 3px solid #059669;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Claude HTML Renderer</h2>
    <div class="info">
      <div class="label">Version</div>
      <div class="value" id="version">v.0.19</div>
    </div>
    <div class="info">
      <div class="label">Features</div>
      <div style="font-size: 12px; line-height: 1.6; color: #374151;">
        ✓ Font size control<br>
        ✓ HTML rendering<br>
        ✓ Chart display
      </div>
    </div>
    <div class="status">
      ✓ Extension Active
    </div>
  </div>
</body>
</html>
